<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout CC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-screen w-screen m-0 select-none overflow-hidden flex items-center justify-center" id="body">
  
  <div id="game-container" class="relative w-full h-full bg-[#0a0a0a]">
    <canvas id="game-canvas" class="block w-full h-full"></canvas>
    
    <!-- Compact Glass Scoreboard -->
    <div id="score-board" class="absolute top-6 left-1/2 -translate-x-1/2 flex gap-8 px-8 py-3 glass-panel pointer-events-none z-10">
      <div class="stat-item">
        <span class="stat-label">Score</span>
        <span id="score-display" class="stat-value">0</span>
      </div>
      <div id="level-container" class="stat-item hidden">
        <span class="stat-label">Level</span>
        <span id="level-display" class="stat-value">1</span>
      </div>
    </div>

    <!-- Flash Overlay -->
    <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-30"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
